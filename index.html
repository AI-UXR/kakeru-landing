<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kakeru — Design Previews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #f9f9fb;
      color: #18181b;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 48px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem; letter-spacing: -0.01em;
      margin-bottom: 8px; color: #18181b;
    }
    .sub {
      font-size: 0.9rem; color: #71717a; margin-bottom: 56px; text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 720px; width: 100%;
    }
    .card {
      background: #fff;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      padding: 28px 28px 24px;
      text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 10px;
      transition: transform 220ms cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 220ms ease,
                  border-color 220ms ease;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--accent);
      border-radius: 18px 18px 0 0;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.10);
      border-color: rgba(0,0,0,0.04);
    }
    .version {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--accent);
    }
    .name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.35rem; font-weight: 400; letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .swatches {
      display: flex; gap: 6px; margin-top: 2px;
    }
    .swatch {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.08);
    }
    .arrow {
      margin-top: 6px;
      font-size: 0.8rem; color: #a1a1aa;
      display: flex; align-items: center; gap: 4px;
      transition: color 200ms, gap 200ms;
    }
    .card:hover .arrow { color: #18181b; gap: 8px; }

    /* V1 — original violet/pink */
    #v1 { --accent: #6c2bd9; }
    /* V2 — coral/orange/yellow */
    #v2 { --accent: #ff5f6d; }
    /* V3 — royal blue/cyan/lime */
    #v3 { --accent: #2563ff; }
    /* V4 — indigo/pink/purple */
    #v4 { --accent: #6c63ff; }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; max-width: 400px; }
    }
  </style>
</head>
<body>
  <p class="logo">駆ける kakeru</p>
  <p class="sub">Select a colour palette to preview</p>

  <div class="grid">
    <a class="card" id="v1" href="/v1">
      <span class="version">Version 1</span>
      <span class="name">Violet &amp; Magenta</span>
      <div class="swatches">
        <span class="swatch" style="background:#6c2bd9"></span>
        <span class="swatch" style="background:#f0147c"></span>
        <span class="swatch" style="background:#00c9a7"></span>
        <span class="swatch" style="background:#ff6b35"></span>
        <span class="swatch" style="background:#0d0a18"></span>
      </div>
      <span class="arrow">View preview →</span>
    </a>

    <a class="card" id="v2" href="/v2">
      <span class="version">Version 2</span>
      <span class="name">Coral &amp; Amber</span>
      <div class="swatches">
        <span class="swatch" style="background:#ff5f6d"></span>
        <span class="swatch" style="background:#ff8a5b"></span>
        <span class="swatch" style="background:#ffc75f"></span>
        <span class="swatch" style="background:#5ac8fa"></span>
        <span class="swatch" style="background:#1e2433"></span>
      </div>
      <span class="arrow">View preview →</span>
    </a>

    <a class="card" id="v3" href="/v3">
      <span class="version">Version 3</span>
      <span class="name">Royal Blue &amp; Lime</span>
      <div class="swatches">
        <span class="swatch" style="background:#2563ff"></span>
        <span class="swatch" style="background:#2de2e6"></span>
        <span class="swatch" style="background:#2f9bff"></span>
        <span class="swatch" style="background:#b9f227"></span>
        <span class="swatch" style="background:#18202d"></span>
      </div>
      <span class="arrow">View preview →</span>
    </a>

    <a class="card" id="v4" href="/v4">
      <span class="version">Version 4</span>
      <span class="name">Indigo, Pink &amp; Peach</span>
      <div class="swatches">
        <span class="swatch" style="background:#6c63ff"></span>
        <span class="swatch" style="background:#ff8daa"></span>
        <span class="swatch" style="background:#c850ff"></span>
        <span class="swatch" style="background:#2de2e6"></span>
        <span class="swatch" style="background:#181a2f"></span>
      </div>
      <span class="arrow">View preview →</span>
    </a>
  </div>
</body>
</html>
